<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Flexbox 卡片练习</title>
    <style>
        /* --- 基础设置 (不需要改) --- */
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            /* 视口高度 */
        }

        /* --- 你的任务区域 (请在下面填空) --- */

        /* 任务 1: 让 body 变成 Flex 容器，把 .card 居中显示 */
        body {
            /* 提示: display: flex; 以及 justify-content, align-items */
            display: flex;
            justify-content: center;
            align-items: center;
        }
 
        #card-container {
            display: flex;       /* 让子元素横向排列 */
            gap: 20px;           /* 卡片之间的间距 */
            flex-wrap: wrap;     /* 如果屏幕太小，允许换行 */
            justify-content: center;
        }

        /* 卡片容器 */
        .card {
            background: white;
            width: 300px;
            border-radius: 12px;
            overflow: hidden;
            /* 防止图片溢出圆角 */

            /* 任务 3-1: 添加一个默认的阴影 (box-shadow) 和过渡动画 (transition) */
            /* transition: ... */
            /* 第一层：紧贴的小阴影，勾勒轮廓 */
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);    
            transition: transform 0.3s ease-in-out;
        }

        /* 任务 3-2: 鼠标悬停 (hover) 时，改变 transform 和 box-shadow */
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            /* box-shadow: ... */
        }

        /* 图片区域 (不需要改) */
        .image-area {
            height: 180px;
            background-color: #3b82f6;
            /* 模拟图片 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }

        /* 内容区域 padding (不需要改) */
        .content {
            padding: 20px;
        }

        h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        p {
            margin: 0 0 20px 0;
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* 任务 2: 底部区域布局 */
        .footer {
            /* 提示: 这里需要让 'price' 和 'btn' 分开在两头 */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e11d48;
        }

        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div style="text-align: center; margin: 30px 0;">
        <input 
        type="text" 
        id="search-input" 
        placeholder="🔍 搜索课程名称..." 
        style="padding: 10px; width: 200px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; margin-right: 15px;"
        >
        
        <button onclick="showAll()" style="padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 10px;">
            显示全部
        </button>
        <button onclick="filterCheap()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
            只看 100元以下
        </button>
    </div>

    <div id="card-container"></div>

    <script>
        const products = [
            { title: "Flexbox 课程", price: "¥ 99.00", priceValue: 99, color: "#3b82f6" },
            { title: "Grid 布局大师", price: "¥ 129.00", priceValue: 129, color: "#10b981" },
            { title: "React 零基础", price: "¥ 299.00", priceValue: 299, color: "#8b5cf6" }
        ];

        const cardsContainer = document.getElementById('card-container');
        showAll();

        function renderCards(list) {
            return list.map((item) => {
                return `
                    <div class="card">
                        <div class="image-area" style="background-color: ${item.color}">🖼️</div>
                        <div class="content">
                        <h3>${item.title}</h3>
                        <p>这是一个自动生成的商品卡片。</p>
                        <div class="footer">
                            <span class="price">${item.price}</span>
                            <button class="btn" onclick="buyItem(this)">立即购买</button>
                        </div>
                        </div>
                    </div>
                `
            }).join('');
        };

        function showAll() {
            cardsContainer.innerHTML = renderCards(products);
        }

        function filterCheap() {
            const cheapOnes = products.filter((item) => item.priceValue < 100);
            cardsContainer.innerHTML = renderCards(cheapOnes);
        }

        function buyItem(buttonElement) {
            alert('购买成功！');
            buttonElement.textContent = '已加入';
            buttonElement.style.backgroundColor = 'green';
        }

        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const searchResult = products.filter((item) => {
                return item.title.toLowerCase().includes(keyword);
            })
            cardsContainer.innerHTML = renderCards(searchResult);
        })
    </script>

</body>

</html>
